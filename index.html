        }

<body>
    <object
        class="cv-document"
        data="./cv.pdf#view=FitH&amp;toolbar=1&amp;navpanes=0"
        type="application/pdf"
        aria-label="June Ji's curriculum vitae"

        <main class="fallback">
            <h1>June Ji</h1>
            <p>M.S. Student, Seoul National University</p>
            <p>Your browser cannot display the CV inline. <a href="./cv.pdf">Open the PDF CV</a>.</p>
