# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.8/schema.json

cv:
  name: June Ji
  headline: Ph.D. Student
  website: https://san-juna-h.github.io
  social_networks:
    - network: Google Scholar
      username: TKOhvukAAAAJ
    - network: ORCID
      username: 0009-0009-0649-4180
  sections:
    Education:
      - institution: Seoul National University
        area: Department of Architecture and Architectural Engineering
        degree: Ph.D.
        date: Sept 2026 – present
        location: Seoul, South Korea
        highlights:
          - 'Advisor: Prof. Changbum Ryan Ahn'
      - institution: Seoul National University
        area: Department of Architecture and Architectural Engineering
        degree: M.S.
        start_date: 2024-09
        end_date: 2026-08
        location: Seoul, South Korea
        highlights:
          - 'Advisor: Prof. Changbum Ryan Ahn'
      - institution: Seoul National University
        area: Department of Architecture and Architectural Engineering
        degree: B.S.
        start_date: 2016-03
        end_date: 2024-02
        location: Seoul, South Korea

design:
  theme: classic
  page:
    size: a4
    show_top_note: false
  templates:
    education_entry:
      main_column: |-
        **INSTITUTION**
        *AREA*
        HIGHLIGHTS

locale:
  language: english

settings:
  current_date: today
  render_command:
    output_folder: rendercv_output
    pdf_path: cv.pdf
    dont_generate_markdown: true
    dont_generate_html: true
    dont_generate_png: true
  pdf_title: June Ji - CV
